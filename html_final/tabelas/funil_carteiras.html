<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funil de carteiras</title>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
  <style>
    html, body { margin: 0; padding: 0; background: #ffffff; color: #0f172a; font-family: Arial, Helvetica, sans-serif; }
    body { padding: 16px; }
    .table-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 12px; }
    .table-wrap { border: 1px solid #dbe3ee; border-radius: 14px; overflow: auto; padding: 10px; box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06); }
    table.dataTable { width: 100% !important; font-size: 14px; }
    table.dataTable thead th { white-space: nowrap; background: #f8fafc !important; }
    table.dataTable tbody td { white-space: nowrap; }
  </style>
</head>
<body>
  <div class="table-title">Funil de carteiras</div>
  <div class="table-wrap">
    <table id="tabela" class="display compact stripe nowrap" style="width:100%">
      <thead><tr><th>ordem_etapa</th><th>etapa_funil</th><th>descricao_etapa</th><th>n_unidades</th><th>pct_total</th></tr></thead>
      <tbody>
        <tr><td>1</td><td>geradas</td><td>Carteiras totais geradas</td><td>6.722</td><td>100,00%</td></tr>
<tr><td>2</td><td>sobreviventes</td><td>Carteiras no universo principal</td><td>1.512</td><td>22,49%</td></tr>
<tr><td>3</td><td>encerradas</td><td>Carteiras encerradas até o último mês válido</td><td>530</td><td>7,88%</td></tr>
      </tbody>
    </table>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script>
    $(document).ready(function() {
      $('#tabela').DataTable({
        pageLength: 25,
        lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, 'Todos']],
        scrollX: true,
        autoWidth: false,
        deferRender: true,
        order: [],
        language: {
          search: 'Buscar:',
          lengthMenu: 'Mostrar _MENU_ linhas',
          info: 'Mostrando _START_ a _END_ de _TOTAL_ linhas',
          infoEmpty: 'Mostrando 0 a 0 de 0 linhas',
          zeroRecords: 'Nenhum registro encontrado',
          paginate: { first: 'Primeira', last: 'Última', next: 'Próxima', previous: 'Anterior' }
        }
      });
    });
  </script>
</body>
</html>
